services:
  db:
    image: mysql:8.0
    container_name: bagithr_db_prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-1234567890}"
      MYSQL_DATABASE: "${DB_NAME:-bagithr}"
      MYSQL_ROOT_HOST: "%"
    volumes:
      - mysql_data_prod:/var/lib/mysql
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s

  mongo:
    image: mongo:6.0
    container_name: bagithr_mongo_prod
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_USER:-admin}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_PASSWORD:-password}"
      MONGO_INITDB_DATABASE: "${MONGO_DB_NAME:-bagithr_indexer}"
    volumes:
      - mongo_data_prod:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --authenticationDatabase admin -u \"${MONGO_USER:-admin}\" -p \"${MONGO_PASSWORD:-password}\" --eval \"db.adminCommand('ping')\" --quiet",
        ]
      timeout: 20s
      retries: 10
      start_period: 15s

  backend:
    build:
      context: .
      target: prod
    container_name: bagithr_backend_prod
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: "${DB_USER:-root}"
      DB_PASSWORD: "${DB_PASSWORD:-1234567890}"
      DB_NAME: "${DB_NAME:-bagithr}"
      APP_ENV: production
      MONGO_HOST: mongo
      MONGO_USER: "${MONGO_USER:-admin}"
      MONGO_PASSWORD: "${MONGO_PASSWORD:-password}"
      MONGO_DB_NAME: "${MONGO_DB_NAME:-bagithr_indexer}"
      SOROBAN_RPC_URL: "${SOROBAN_RPC_URL:-https://soroban-testnet.stellar.org}"
      SWAP_CONTRACT_ID: "${SWAP_CONTRACT_ID:-CBSD7WDEPMMN445EEASL46U5CJUHSBJS7FTA5WTSWDBRF2HCTGGO6YHH}"
      NFT_GIFT_CONTRACT_ID: "${NFT_GIFT_CONTRACT_ID:-CDVV3ZSS6XRGNCI2APQNQZNSEAJX33HXOTXK2UTDQHNUXMPEQKRIHY4W}"
      MARKETPLACE_CONTRACT_ID: "${MARKETPLACE_CONTRACT_ID:-CA4AZ4DNYNCE7ERVCROQEKHHDEOMSZGOUHKSCLPEP6O3W2EDVRGBVZ5Z}"
      MULTI_ROOM_CONTRACT_ID: "${MULTI_ROOM_CONTRACT_ID:-CC7P7Z76HKKCXC2WHYMFNSQPSREZHMSB3FNASU3AFZB7I2POOOQVIF3A}"
      TOKEN_REGISTRY_CONTRACT_ID: "${TOKEN_REGISTRY_CONTRACT_ID:-CC7NJZFTQGIZOW6XYGB7YABYJIBY2OFIOWNJ6EHYX66KJIGXR7WWC2NT}"
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy
    restart: always
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/\")'",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  nginx:
    image: nginx:alpine
    container_name: bagithr_nginx_prod
    restart: always
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

volumes:
  mysql_data_prod:
  mongo_data_prod:
